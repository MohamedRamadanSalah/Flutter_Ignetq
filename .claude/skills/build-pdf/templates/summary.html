<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{LECTURE_TITLE}} — Study Summary</title>
<style>
/* ── Variables ─────────────────────────── */
:root {
  --blue:     #2563eb;
  --indigo:   #4f46e5;
  --purple:   #7c3aed;
  --teal:     #0d9488;
  --amber:    #d97706;
  --green:    #16a34a;
  --rose:     #e11d48;
  --bg:       #f8fafc;
  --surface:  #ffffff;
  --text:     #1e293b;
  --muted:    #64748b;
  --border:   #e2e8f0;
}

/* ── Page setup ────────────────────────── */
@page { size: A4; margin: 17mm 15mm 20mm 15mm; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'Arial', sans-serif;
  font-size: 10.5pt;
  line-height: 1.7;
  color: var(--text);
  background: var(--bg);
}

/* ── Cover header ──────────────────────── */
.cover-header {
  background: linear-gradient(135deg, #0f2044 0%, #1d4ed8 55%, #4338ca 100%);
  color: #fff;
  padding: 30px 32px 26px;
  border-radius: 14px;
  margin-bottom: 26px;
  position: relative;
  overflow: hidden;
}
.cover-header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,0.05);
  border-radius: 50%;
}
.cover-header::after {
  content: '';
  position: absolute;
  bottom: -25px; left: 80px;
  width: 90px; height: 90px;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
}
.cover-label {
  font-size: 8.5pt;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  opacity: 0.7;
  margin-bottom: 7px;
}
.cover-title {
  font-size: 21pt;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.cover-subtitle {
  font-size: 12pt;
  opacity: 0.82;
  margin-top: 7px;
}
.cover-meta {
  display: flex;
  gap: 14px;
  margin-top: 18px;
  flex-wrap: wrap;
}
.cover-chip {
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 9pt;
  font-weight: 500;
}

/* ── Key takeaways banner ──────────────── */
.takeaways {
  background: linear-gradient(90deg, #0f172a 0%, #1e3a5f 100%);
  color: #fff;
  border-radius: 12px;
  padding: 18px 22px;
  margin-bottom: 22px;
}
.takeaways h3 {
  font-size: 11pt;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  color: #7dd3fc;
}
.takeaways ul {
  list-style: none;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.takeaways ul li {
  font-size: 9.5pt;
  display: flex;
  align-items: flex-start;
  gap: 7px;
  opacity: 0.92;
}
.takeaways ul li::before {
  content: '✓';
  color: #4ade80;
  font-weight: 800;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ── Section container ─────────────────── */
.section {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 18px;
  overflow: hidden;
  page-break-inside: avoid;
}
.section-header {
  background: linear-gradient(90deg, #1e40af, #4338ca);
  color: #fff;
  padding: 11px 20px;
  font-size: 11pt;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 9px;
  letter-spacing: -0.01em;
}
.section-icon { font-size: 14pt; }
.section-body { padding: 16px 20px; }

/* Alternate section header colors */
.section.teal .section-header    { background: linear-gradient(90deg, #0f766e, #0d9488); }
.section.purple .section-header  { background: linear-gradient(90deg, #6d28d9, #7c3aed); }
.section.indigo .section-header  { background: linear-gradient(90deg, #3730a3, #4f46e5); }
.section.slate .section-header   { background: linear-gradient(90deg, #1e293b, #334155); }

/* ── Concept box ───────────────────────── */
.concept {
  background: #eff6ff;
  border-left: 4px solid var(--blue);
  border-radius: 0 8px 8px 0;
  padding: 11px 15px;
  margin-bottom: 11px;
}
.concept-title {
  font-size: 10pt;
  font-weight: 700;
  color: #1d4ed8;
  margin-bottom: 3px;
}
.concept-body { font-size: 10pt; color: var(--text); }

/* ── Definition box ────────────────────── */
.def {
  background: #fefce8;
  border-left: 4px solid var(--amber);
  border-radius: 0 8px 8px 0;
  padding: 10px 15px;
  margin-bottom: 10px;
}
.def-term { font-size: 10pt; font-weight: 700; color: #92400e; }
.def-body { font-size: 10pt; color: var(--text); }

/* ── Formula box ───────────────────────── */
.formula {
  background: #fdf4ff;
  border-left: 4px solid var(--purple);
  border-radius: 0 8px 8px 0;
  padding: 12px 16px;
  margin-bottom: 12px;
}
.formula-label {
  font-size: 8.5pt;
  font-weight: 700;
  color: var(--purple);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 5px;
}
.formula-expr {
  font-family: 'Courier New', 'Consolas', monospace;
  font-size: 11pt;
  color: #3b0764;
  background: rgba(124,58,237,0.06);
  padding: 6px 10px;
  border-radius: 6px;
  display: inline-block;
}

/* ── Tip / callout box ─────────────────── */
.tip {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-left: 4px solid var(--green);
  border-radius: 0 8px 8px 0;
  padding: 11px 15px;
  margin-bottom: 11px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.tip-icon { font-size: 15pt; flex-shrink: 0; }
.tip-text { font-size: 10pt; color: #14532d; }

/* ── Warning / watch-out box ───────────── */
.warn {
  background: #fff7ed;
  border: 1px solid #fed7aa;
  border-left: 4px solid var(--rose);
  border-radius: 0 8px 8px 0;
  padding: 11px 15px;
  margin-bottom: 11px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.warn-icon { font-size: 15pt; flex-shrink: 0; }
.warn-text { font-size: 10pt; color: #9a3412; }

/* ── Bullet list ───────────────────────── */
ul.points {
  list-style: none;
  padding: 0;
}
ul.points li {
  padding: 5px 0 5px 18px;
  position: relative;
  font-size: 10pt;
  border-bottom: 1px solid #f1f5f9;
}
ul.points li:last-child { border-bottom: none; }
ul.points li::before {
  content: '▸';
  position: absolute;
  left: 0;
  color: var(--blue);
  font-size: 9pt;
  top: 6px;
}

/* ── Numbered list ─────────────────────── */
ol.steps { padding-left: 0; list-style: none; counter-reset: step; }
ol.steps li {
  counter-increment: step;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 6px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 10pt;
}
ol.steps li:last-child { border-bottom: none; }
ol.steps li::before {
  content: counter(step);
  background: var(--blue);
  color: #fff;
  font-size: 9pt;
  font-weight: 700;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

/* ── Two-column grid ───────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* ── Mini table ────────────────────────── */
.mini-table { width: 100%; border-collapse: collapse; font-size: 9.5pt; }
.mini-table th {
  background: #eff6ff;
  color: #1d4ed8;
  padding: 8px 12px;
  text-align: left;
  font-size: 9pt;
  font-weight: 700;
  border-bottom: 2px solid #bfdbfe;
}
.mini-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.mini-table tr:last-child td { border-bottom: none; }
.mini-table tr:nth-child(even) td { background: #f8fafc; }

/* ── Highlight / badge ─────────────────── */
.hl {
  background: #dbeafe;
  color: #1e40af;
  padding: 1px 7px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 9.5pt;
}
.hl-green  { background: #dcfce7; color: #166534; }
.hl-amber  { background: #fef3c7; color: #92400e; }
.hl-purple { background: #ede9fe; color: #5b21b6; }

/* ── Page break ────────────────────────── */
.page-break { page-break-after: always; height: 0; }

/* ── Footer ────────────────────────────── */
.summary-footer {
  text-align: center;
  font-size: 8.5pt;
  color: #94a3b8;
  margin-top: 28px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<!-- ═══════════════════════════════════════════════════════════════════
     CONTENT INJECTED BY Claude's /build-pdf step.
     Use the CSS classes above to structure the summary:
       .cover-header  →  title block
       .takeaways     →  key takeaways grid
       .section       →  main content sections (add .teal/.purple/.indigo/.slate for variety)
       .concept       →  key concept boxes
       .def           →  definition boxes
       .formula       →  formula boxes
       .tip / .warn   →  callout / watch-out boxes
       .mini-table    →  comparison tables
       .two-col       →  side-by-side layout
═══════════════════════════════════════════════════════════════════ -->
</body>
</html>
